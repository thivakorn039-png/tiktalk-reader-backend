name: Build Windows Exe

on:
  push:
    paths:
      - '**/*.py'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --name TikTalkReader --onefile --add-data "static;static" --hidden-import uvicorn --hidden-import pydantic --hidden-import websockets main.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: TikTalk-Reader-Windows-EXE
        path: dist/TikTalkReader.exe
