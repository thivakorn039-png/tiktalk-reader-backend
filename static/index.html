<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTalk AI Reader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header class="header glass-panel">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                    <line x1="12" y1="19" x2="12" y2="22"></line>
                </svg>
                <h1>TikTalk <span>Reader</span></h1>
            </div>
            <div id="status-badge" class="status-badge disconnected">Disconnected</div>
        </header>

        <main class="main-content">
            <!-- Connection Panel -->
            <section class="glass-panel connect-panel">
                <p class="description">AI-powered Text-to-Speech for your TikTok LIVE comments and gifts.</p>
                <div class="input-group">
                    <input type="text" id="username-input" placeholder="TikTok Username (e.g. @username)" autocomplete="off">
                    <button id="connect-btn" class="btn primary">Connect</button>
                </div>
            </section>

            <!-- Reader Settings Panel -->
            <section class="glass-panel settings-panel">
                <div class="setting-item">
                    <label for="voice-select">Voice</label>
                    <select id="voice-select"></select>
                </div>
                <div class="setting-item">
                    <label for="speed-slider">Speed (<span id="speed-value">1.0</span>x)</label>
                    <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </section>

            <!-- Activity Log -->
            <section class="glass-panel activity-panel">
                <div class="panel-header">
                    <h2>Live Activity</h2>
                    <span id="queue-count" class="queue-badge">0 in queue</span>
                </div>
                <div id="activity-log" class="activity-log">
                    <div class="empty-state">
                        Waiting for events...
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
